              trigger_prototypes:
                - uuid: efa73771f3534a38b96d139d07b6ee7d
                  expression: 'last(/AD DS User Monitoring Agent Active/PasswordExpiringUsers[{#USER}])=1'
                  name: 'Password for {#USER} expires in {#DAYS_TO_EXPIRE} days (expires {#PWDEXPIRES})'
                  priority: WARNING
          master_item:
            key: 'PasswordExpiringUsers[{$AD.PASSWORD.EXPIRES.IN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
