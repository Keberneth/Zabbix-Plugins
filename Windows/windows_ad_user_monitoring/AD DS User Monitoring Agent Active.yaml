                  var text = (value || "").trim();
                  if (!text) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var parsed;
                  try { parsed = JSON.parse(text); } catch (e) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var isArray = Object.prototype.toString.call(parsed) === "[object Array]";
                  var arr = isArray ? parsed : (parsed ? [parsed] : []);
                  
                  var data = [];
                  for (var i = 0; i < arr.length; i++) {
                    var u = arr[i];
                    data.push({
                      "{#USER}": u.sAMAccountName,
                      "{#UPN}": u.UserPrincipalName,
                      "{#DN}": u.DistinguishedName,
                      "{#PWDEXPIRES}": u.PasswordExpiresUtc,
                      "{#DAYS_TO_EXPIRE}": u.DaysToExpire
                    });
                  }
                  
                  return JSON.stringify({ "data": data });
      macros:
        - macro: '{$AD.ACCOUNT.EXPIRES.IN.DAYS}'
          value: '7'
          description: 'Account expiration threshold (days). Used by UsersAboutToBeDisabled[days,...].'
        - macro: '{$AD.DISABLED.OLDER.THAN.DAYS}'
          value: '30'
          description: 'Disabled user threshold (days). Used by DisabledUsers[days,...].'
        - macro: '{$AD.LDAP.SERVER}'
          description: |
            Optional: specify the domain controller to query (hostname/FQDN).
            Leave empty to let Windows choose.
        - macro: '{$AD.PASSWORD.EXPIRES.IN.DAYS}'
          value: '7'
          description: 'Password expiry threshold (days). Used by PasswordExpiringUsers[days,...].'
        - macro: '{$AD.SEARCH.BASES}'
          description: |
            Base DN(s) to search (OU/container). Leave empty to search the whole domain.
            Multiple base DNs can be separated with ';' or '|'.
            Example: OU=Users,DC=example,DC=com;OU=Admins,DC=example,DC=com
