zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 685216637ec94d8db2d3af5a07493950
      template: 'AD DS User Monitoring Agent Active'
      name: 'AD DS User Monitoring Agent Active'
      description: |
        Monitor Active Directory users via Zabbix Agent 2 (Go plugin).
        
        Functions included:
        - Locked-out users (trigger per locked account)
        - Disabled users older than N days (trigger per disabled account)
        - Users with passwords expiring within N days (trigger per account)
        - Users with account expiration within N days (accountExpires) (trigger per account)
        
        OU scoping:
        - Set {$AD.SEARCH.BASES} to a base DN (OU/container) to limit searches.
        - Multiple OUs are supported by separating base DNs with ';' or '|'.
          Example:
            OU=Admins,DC=example,DC=com;OU=Service Accounts,DC=example,DC=com
        
        Note on 'Execute now':
        - The master items in this template are Zabbix Agent (active) checks.
          Zabbix cannot 'Execute now' active checks, so running 'Execute now'
          on dependent discovery rules will show an error. Discovery works normally
          when the agent sends the master item value on schedule.
      vendor:
        name: Keberneth
        version: 7.0-0-2
      groups:
        - name: Templates
      items:
        - uuid: 17048fd394844e4f8dd0c8ce60268fa1
          name: 'AD Disabled Users JSON'
          type: ZABBIX_ACTIVE
          key: 'DisabledUsers[{$AD.DISABLED.OLDER.THAN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          delay: 24h
          value_type: TEXT
          trends: '0'
          status: DISABLED
          timeout: 600s
        - uuid: edbf9ec7c3bc484e8674fc7e7cce9c29
          name: 'AD Locked Users JSON'
          type: ZABBIX_ACTIVE
          key: 'LockedOutUsers["{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          delay: 12h
          value_type: TEXT
          trends: '0'
          timeout: 90s
        - uuid: 00c2d5fc82204ff994810d278a2426f5
          name: 'AD Password Expiring Users JSON'
          type: ZABBIX_ACTIVE
          key: 'PasswordExpiringUsers[{$AD.PASSWORD.EXPIRES.IN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          delay: 12h
          value_type: TEXT
          trends: '0'
          timeout: 90s
        - uuid: c8d26984c0ff4d7d8064e1d80a183e31
          name: 'AD Users About To Be Disabled JSON'
          type: ZABBIX_ACTIVE
          key: 'UsersAboutToBeDisabled[{$AD.ACCOUNT.EXPIRES.IN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          delay: 12h
          value_type: TEXT
          trends: '0'
          timeout: 90s
      discovery_rules:
        - uuid: 5b3b6a343d0f425b824ad0328846ca8d
          name: 'AD locked users'
          type: DEPENDENT
          key: LockedUsers
          delay: '0'
          item_prototypes:
            - uuid: 98af745d9bb840beb8c23d6dab50f2c8
              name: 'AD User: [{#USER}] Locked'
              type: DEPENDENT
              key: 'LockedOutUsers[{#USER}]'
              delay: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var text = (value || "").trim();
                      if (!text) return 0;   // no data => not locked
                      
                      var arr;
                      try { arr = JSON.parse(text); } catch (e) { return 0; }
                      if (Object.prototype.toString.call(arr) !== "[object Array]") {
                        arr = arr ? [arr] : [];
                      }
                      for (var i = 0; i < arr.length; i++) {
                        if (arr[i].sAMAccountName === "{#USER}") return 1;
                      }
                      return 0;
              master_item:
                key: 'LockedOutUsers["{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
              tags:
                - tag: 'Customer Read'
              trigger_prototypes:
                - uuid: 58f26b377d2743c18b168170664ed935
                  expression: 'last(/AD DS User Monitoring Agent Active/LockedOutUsers[{#USER}])=1'
                  name: 'Account {#USER} is locked'
                  priority: AVERAGE
          master_item:
            key: 'LockedOutUsers["{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // value can be "", "[]", "null" or JSON array
                  var text = (value || "").trim();
                  if (!text) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var parsed;
                  try { parsed = JSON.parse(text); } catch (e) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var isArray = Object.prototype.toString.call(parsed) === "[object Array]";
                  var arr = isArray ? parsed : (parsed ? [parsed] : []);
                  
                  var data = [];
                  for (var i = 0; i < arr.length; i++) {
                    var u = arr[i];
                    data.push({
                      "{#USER}": u.sAMAccountName,
                      "{#UPN}": u.UserPrincipalName,
                      "{#DN}": u.DistinguishedName,
                      "{#LOCKSINCE}": u.LockoutTimeUtc
                    });
                  }
                  return JSON.stringify({ "data": data });
        - uuid: ba83d57bff764535809a98200516075d
          name: 'AD users about to be disabled (account expiration)'
