              key: 'UsersAboutToBeDisabled[{#USER}]'
              delay: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var text = (value || "").trim();
                      if (!text) return 0;
                      
                      var arr;
                      try { arr = JSON.parse(text); } catch (e) { return 0; }
                      if (Object.prototype.toString.call(arr) !== "[object Array]") {
                        arr = arr ? [arr] : [];
                      }
                      for (var i = 0; i < arr.length; i++) {
                        if (arr[i].sAMAccountName === "{#USER}") return 1;
                      }
                      return 0;
              master_item:
                key: 'UsersAboutToBeDisabled[{$AD.ACCOUNT.EXPIRES.IN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
              tags:
                - tag: 'Customer Read'
              trigger_prototypes:
                - uuid: d79392ff5546403fa110afb059445213
                  expression: 'last(/AD DS User Monitoring Agent Active/UsersAboutToBeDisabled[{#USER}])=1'
                  name: 'Account {#USER} expires in {#DAYS_TO_DISABLE} days (expires {#ACCOUNT_EXPIRES})'
                  priority: WARNING
          master_item:
            key: 'UsersAboutToBeDisabled[{$AD.ACCOUNT.EXPIRES.IN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var text = (value || "").trim();
                  if (!text) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var parsed;
                  try { parsed = JSON.parse(text); } catch (e) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var isArray = Object.prototype.toString.call(parsed) === "[object Array]";
                  var arr = isArray ? parsed : (parsed ? [parsed] : []);
                  
                  var data = [];
                  for (var i = 0; i < arr.length; i++) {
                    var u = arr[i];
                    data.push({
                      "{#USER}": u.sAMAccountName,
                      "{#UPN}": u.UserPrincipalName,
                      "{#DN}": u.DistinguishedName,
                      "{#ACCOUNT_EXPIRES}": u.AccountExpiresUtc,
                      "{#DAYS_TO_DISABLE}": u.DaysToDisable
                    });
                  }
                  
                  return JSON.stringify({ "data": data });
        - uuid: 7184ef07d8bd40758b68c61dee9a5161
          name: 'AD disabled users (older than N days)'
          type: DEPENDENT
          key: UsersDisabled
          delay: '0'
          item_prototypes:
            - uuid: c17ef8dfcfd44485859941be2294df10
              name: 'AD User: [{#USER}] Disabled'
              type: DEPENDENT
              key: 'ad.disabled.status[{#USER}]'
              delay: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var text = (value || "").trim();
                      if (!text) return 0;
                      
                      var arr;
                      try { arr = JSON.parse(text); } catch (e) { return 0; }
                      if (Object.prototype.toString.call(arr) !== "[object Array]") {
                        arr = arr ? [arr] : [];
                      }
                      for (var i = 0; i < arr.length; i++) {
                        if (arr[i].sAMAccountName === "{#USER}") return 1; // in list => disabled
                      }
                      return 0;
              master_item:
                key: 'DisabledUsers[{$AD.DISABLED.OLDER.THAN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
              trigger_prototypes:
                - uuid: fa02091cba6b4b1d9c25222c32cac265
                  expression: 'last(/AD DS User Monitoring Agent Active/ad.disabled.status[{#USER}])=1'
                  name: 'Account {#USER} is disabled (since {#DISABLED_SINCE})'
                  priority: INFO
          master_item:
            key: 'DisabledUsers[{$AD.DISABLED.OLDER.THAN.DAYS},"{$AD.SEARCH.BASES}","{$AD.LDAP.SERVER}"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var text = (value || "").trim();
                  if (!text) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var parsed;
                  try { parsed = JSON.parse(text); } catch (e) {
                    return JSON.stringify({ "data": [] });
                  }
                  
                  var isArray = Object.prototype.toString.call(parsed) === "[object Array]";
                  var arr = isArray ? parsed : (parsed ? [parsed] : []);
                  
                  var data = [];
                  for (var i = 0; i < arr.length; i++) {
                    var u = arr[i];
                    data.push({
                      "{#USER}": u.sAMAccountName,
                      "{#UPN}": u.UserPrincipalName,
                      "{#DN}": u.DistinguishedName,
                      "{#DISABLED_SINCE}": u.DisabledSinceUtc,
                      "{#DAYS_DISABLED}": u.DaysDisabled
                    });
                  }
                  return JSON.stringify({ "data": data });
        - uuid: e98d0f0b77874f37853f0a1ec57d3785
          name: 'AD users with passwords expiring soon'
          type: DEPENDENT
          key: UsersPasswordExpiring
          delay: '0'
          item_prototypes:
            - uuid: dfe6bab8a6cc4e99851baa5eae970543
              name: 'AD User: [{#USER}] Password expiring'
              type: DEPENDENT
              key: 'PasswordExpiringUsers[{#USER}]'
              delay: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var text = (value || "").trim();
                      if (!text) return 0;
                      
                      var arr;
                      try { arr = JSON.parse(text); } catch (e) { return 0; }
                      if (Object.prototype.toString.call(arr) !== "[object Array]") {
                        arr = arr ? [arr] : [];
                      }
                      for (var i = 0; i < arr.length; i++) {
                        if (arr[i].sAMAccountName === "{#USER}") return 1;
                      }
