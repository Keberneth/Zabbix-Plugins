# Windows Latest Update (Go plugin)
# Keys:
#   wlu.update.installed       -> 0 if current month's CU is installed, 1 otherwise
#   wlu.update.installed[YYYY-MM]
#                              -> same check against an explicit month
#   wlu.update.status          -> JSON snapshot (matched titles, KB list, install date,
#                                 collection mode, errors)
#
# Run manually for testing:
#   & "C:\Program Files\Zabbix Agent 2\zabbix-agent2-windows-latest-update.exe" --standalone --verbose
#   & "C:\Program Files\Zabbix Agent 2\zabbix-agent2-windows-latest-update.exe" --standalone --verbose --month 2026-04
#
# Test through Agent 2:
#   & "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe" -c "C:\Program Files\Zabbix Agent 2\zabbix_agent2.conf" -t wlu.update.installed
#   & "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe" -c "C:\Program Files\Zabbix Agent 2\zabbix_agent2.conf" -t wlu.update.status
#
# Notes:
#   - Deploy on each Windows host you want to monitor.
#   - The plugin shells out to PowerShell and queries the Windows Update history
#     COM API (Microsoft.Update.Session). Defender signatures, MSRT, .NET Framework,
#     and Servicing Stack updates are excluded; the regex matches both the legacy
#     "Windows Server" and the newer "Microsoft server operating system" naming
#     used for Windows Server 2022/2025, plus Windows 10/11 client titles.
#   - On transient collection failures the plugin serves the last good payload for
#     up to 30 minutes and marks it as cached in the JSON, so the template can warn
#     without flapping.
#   - Patch Tuesday caveat: early in the month the current CU may not be released
#     yet; tune triggers with a delay or check a previous month using the
#     parameterized key wlu.update.installed[YYYY-MM].
Plugins.WindowsLatestUpdate.System.Path=C:\Program Files\Zabbix Agent 2\zabbix-agent2-windows-latest-update.exe
