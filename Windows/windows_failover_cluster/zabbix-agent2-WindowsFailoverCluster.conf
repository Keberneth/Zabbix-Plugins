# Windows Failover Cluster (Go plugin)
# Key: wfc.cluster.status
#
# Run manually for testing:
#   & "C:\Program Files\Zabbix Agent 2\zabbix-agent2-windows-failover-cluster.exe" --standalone --verbose
#
# Test through Agent 2:
#   & "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe" -c "C:\Program Files\Zabbix Agent 2\zabbix_agent2.conf" -t wfc.cluster.status
#
# Notes:
#   - Deploy the plugin locally on each Windows Failover Cluster node.
#   - The plugin uses the FailoverClusters PowerShell module from inside the Go binary.
#   - On transient collection failures the plugin serves the last good payload for up to 15 minutes
#     and marks it as cached in the JSON so the template can warn without flapping.
#   - The template deduplicates cluster-level triggers by default and emits them from the
#     current core cluster owner node only.
Plugins.WindowsFailoverCluster.System.Path=C:\Program Files\Zabbix Agent 2\zabbix-agent2-windows-failover-cluster.exe
