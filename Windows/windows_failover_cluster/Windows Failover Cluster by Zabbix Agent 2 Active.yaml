        - uuid: fce96954ec814d08ab43b10e3881b057
          name: 'WFC cluster IP discovery'
          type: DEPENDENT
          key: wfc.clusterip.discovery
          delay: '0'
          item_prototypes:
            - uuid: 1e057b0f7e8d4caeb4d93109fc30de6f
              name: 'WFC Cluster IP "{#IPNAME}" address'
              type: DEPENDENT
              key: 'wfc.clusterip.address["{#IPNAME}"]'
              delay: '0'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var name = "{#IPNAME}";
                      var j = JSON.parse(value);
                      if (j && Array.isArray(j.ClusterIPs)) {
                        for (var i = 0; i < j.ClusterIPs.length; i++) {
                          var ip = j.ClusterIPs[i];
                          if (ip && ip.Name === name) {
                            return ip.Address || null;
                          }
                        }
                      }
                      return null;
              master_item:
                key: wfc.cluster.status
