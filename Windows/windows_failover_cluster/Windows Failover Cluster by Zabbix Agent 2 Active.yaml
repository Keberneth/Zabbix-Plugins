      macros:
        - macro: '{$WFC.CACHED.WARN.SEC}'
          value: '300'
          description: 'Raise a local warning if the plugin is serving cached cluster data older than this many seconds.'
        - macro: '{$WFC.COLLECT.INTERVAL}'
          value: 5m
          description: 'How often the Go plugin collects the cluster snapshot.'
        - macro: '{$WFC.DEDUP.CLUSTER_ALERTS}'
          value: '1'
          description: 'Set to 1 to emit cluster-level triggers only from the current core cluster owner node. Set to 0 to alert from both nodes.'
        - macro: '{$WFC.EVENTLOG.INTERVAL}'
          value: 5m
          description: 'Polling interval for Windows eventlog[] items.'
        - macro: '{$WFC.EVENTLOG.WINDOW}'
          value: 10m
          description: 'How long eventlog-based triggers should stay open after the matching cluster event ID was seen.'
        - macro: '{$WFC.GROUP.EXCLUDE.MATCHES}'
          value: '^(Available Storage)$'
          description: 'Regex for clustered roles that should not be discovered by default.'
        - macro: '{$WFC.GROUP.FAILOVER.INFO}'
          value: '1'
          description: 'Set to 1 to generate informational events when a clustered role owner changes.'
        - macro: '{$WFC.GROUP.PROBLEM.WINDOW}'
          value: 10m
          description: 'How long a clustered role must stay non-Online before the per-role trigger is raised.'
        - macro: '{$WFC.IP.PROBLEM.WINDOW}'
          value: 10m
          description: 'How long a clustered IP resource must stay non-Online before the trigger is raised.'
        - macro: '{$WFC.NODATA.WINDOW}'
          value: 15m
          description: 'Raise a local collection problem if no cluster JSON is received inside this window.'
        - macro: '{$WFC.NODE.PROBLEM.WINDOW}'
          value: 10m
          description: 'How long a node must stay down before the per-node trigger is raised.'
        - macro: '{$WFC.WITNESS.PROBLEM.WINDOW}'
          value: 10m
          description: 'How long the witness can stay unhealthy before the trigger is raised.'
        - macro: '{$WFC.WITNESS.REQUIRED}'
          value: '1'
          description: 'Set to 1 for two-node clusters that require a witness. Set to 0 if no witness alert should be raised.'
  triggers:
    - uuid: 7e0e8da9701a47f7bf1cad484537d0eb
      expression: '(last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.quorum.force_quorum)=1) and ({$WFC.DEDUP.CLUSTER_ALERTS}=0 or last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.local.node)=last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.cluster.group_owner))'
      name: 'WFC cluster is in forced quorum'
      priority: HIGH
    - uuid: bfdfcb6e536a4c699c64ce6da624f4b1
      expression: 'last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.collection.mode)<>"live" and last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.collection.age)>={$WFC.CACHED.WARN.SEC}'
      name: 'WFC plugin is serving cached cluster data'
      priority: WARNING
    - uuid: bddf0dcd22004aba90c2da32342675aa
      expression: '(min(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.witness.health,{$WFC.WITNESS.PROBLEM.WINDOW})=0 and {$WFC.WITNESS.REQUIRED}=1) and ({$WFC.DEDUP.CLUSTER_ALERTS}=0 or last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.local.node)=last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.cluster.group_owner))'
      name: 'WFC witness is not healthy'
      priority: HIGH
    - uuid: f768efc39bc54234aae4b8b5dfc80a53
      expression: '(last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.witness.present)=0 and {$WFC.WITNESS.REQUIRED}=1) and ({$WFC.DEDUP.CLUSTER_ALERTS}=0 or last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.local.node)=last(/Windows Failover Cluster by Zabbix Agent 2 Active/wfc.cluster.group_owner))'
      name: 'WFC witness is required but not detected'
      priority: HIGH
